name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # Только backend: ./... тянет случайные go.mod из frontend/node_modules (напр. flatted).
      - name: Test
        run: go test -buildvcs=false -race ./backend/...
